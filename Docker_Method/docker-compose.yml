version: "3"
services:
  gateway:
    build: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/app   # <--- 挂载本地代码
    environment:
        - PYTHONUNBUFFERED=1
    depends_on:
      - ckd-service


  ckd-service:
    build: ckd-service
    ports:
      - "5001:5001"



  frontend:
    build: frontend
    ports:
      - "8501:8501"
    depends_on:
      - gateway
